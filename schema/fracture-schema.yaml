# ADE Channel Fracture Registry — Entry Schema v1.0

entry:
  cf_id:
    type: string
    format: "CF-NNNN"
    description: "Registry ID (4-digit domain identifier, not GitHub issue number)"
    example: "CF-0001"
  
  title:
    type: string
    description: "Concise description of the fracture"
    example: "Scheduled Memory Injection Silent Failure"
  
  category:
    type: string
    enum:
      - "Config override"
      - "Tool surface illusion"
      - "Hook not firing"
      - "Silent message loss"
      - "Connection illusion"
      - "Credential scope bypass"
      - "Memory blindness"
      - "Env contamination"
      - "Process lifecycle"
    description: "Root cause category from CFR taxonomy"
  
  affected_system:
    type: string
    description: "Agent framework or system where fracture occurred"
    example: "Hermes Agent"
  
  layer:
    type: string
    enum: ["L1", "L2", "L3", "L4", "L5"]
    description: "ADE architecture layer"
  
  failure_mode:
    type: string
    description: "Classification of the failure mechanism"
    example: "Silent Delivery Failure"
  
  trigger:
    type: string
    description: "Condition or context that triggers the fracture"
    example: "Cron execution context with skip_memory=True"
  
  observed_symptom:
    type: string
    description: "What the operator observes"
    example: "Memory write request accepted but not persisted"
  
  root_cause:
    type: string
    description: "Underlying cause at the boundary"
    example: "skip_memory=True isolation guard"
  
  detection:
    type: string
    description: "CADVP verification method"
    example: "CADVP CC-0 verification"
  
  impact:
    type: string
    description: "Consequence of the fracture"
    example: "False belief of successful knowledge transfer"
  
  mitigation:
    type: string
    description: "How to prevent or recover"
    example: "Channel verification before trust update"
  
  reference:
    type: string
    description: "Academic reference"
    example: "arxiv:2606.04896"
  
  issue:
    type: string
    format: uri
    description: "GitHub issue URL with evidence"
  
  status:
    type: string
    enum: ["Confirmed", "Fixed", "Open"]
    description: "Current status of the fracture"

taxonomy:
  categories:
    communication:
      description: "Cross-boundary communication failures"
      patterns: ["Hook not firing", "Silent message loss", "Connection illusion"]
    memory:
      description: "Memory and context failures"
      patterns: ["Memory blindness"]
    execution:
      description: "Execution and tool failures"
      patterns: ["Tool surface illusion", "Process lifecycle"]
    verification:
      description: "Verification and detection failures"
      patterns: []
    configuration:
      description: "Configuration and state failures"
      patterns: ["Config override", "Credential scope bypass", "Env contamination"]

version: "1.0.0"
last_updated: "2026-07-10"
